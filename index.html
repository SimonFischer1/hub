<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simon Hub</title>

<style>

:root{
--navy:#172A39;
--cream:#E9E4E0;
--orange:#FC563C;
--gray:#6E7575;
--dark:#0d141b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:var(--navy);
color:var(--cream);
overflow-x:hidden;
min-height:100vh;
}

/* ANIMIERTER HINTERGRUND */

.background{
position:fixed;
inset:0;
overflow:hidden;
z-index:-1;
}

.circle{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:.12;
animation:float 16s infinite ease-in-out;
}

.circle1{
width:450px;
height:450px;
background:var(--orange);
top:-120px;
right:-100px;
}

.circle2{
width:350px;
height:350px;
background:var(--cream);
bottom:-100px;
left:-100px;
animation-delay:4s;
}

.circle3{
width:250px;
height:250px;
background:#ffffff;
top:40%;
left:50%;
animation-delay:8s;
}

@keyframes float{
0%,100%{
transform:translateY(0) translateX(0);
}
50%{
transform:translateY(-40px) translateX(20px);
}
}

.container{
width:min(1500px,94%);
margin:auto;
padding:20px;
}

/* Suche */

.search-wrapper{
padding-top:20px;
display:flex;
justify-content:center;
}

.search-box{
display:flex;
width:min(900px,100%);
backdrop-filter:blur(15px);
}

.search-box input{
flex:1;
padding:18px;
font-size:18px;
border:none;
outline:none;
background:rgba(233,228,224,0.95);
color:var(--navy);
border-radius:20px 0 0 20px;
}

.search-box button{
width:80px;
border:none;
cursor:pointer;
font-size:24px;
background:var(--orange);
color:white;
border-radius:0 20px 20px 0;
transition:.3s;
}

.search-box button:hover{
background:white;
color:var(--navy);
}

/* Zeitkarte */

.time-card{
max-width:500px;
margin:35px auto;
text-align:center;
padding:25px;
border-radius:25px;
border:2px solid rgba(255,255,255,.5);
background:rgba(13,20,27,.75);
backdrop-filter:blur(15px);
}

.clock{
font-size:48px;
font-weight:700;
color:var(--cream);
}

.utc{
margin-top:12px;
font-size:20px;
}

.date{
margin-top:8px;
font-size:20px;
}

.separator{
width:100%;
height:2px;
background:rgba(255,255,255,.3);
margin:35px 0;
}

/* Projekte */

.projects{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.project{
text-decoration:none;
color:white;
border-radius:20px;
overflow:hidden;
transition:.3s;
}

.project:hover{
transform:translateY(-8px);
}

.project-card{
height:220px;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:bold;
}

.weather-card{
background:linear-gradient(135deg,#1f4fff,#172A39);
}

.nautico-card{
background:linear-gradient(135deg,#12b76a,#172A39);
}

.coming-card{
background:linear-gradient(135deg,#FC563C,#172A39);
}

.project-name{
padding:18px;
text-align:center;
font-size:24px;
font-weight:600;
background:rgba(0,0,0,.25);
}

/* Quicklinks */

.quicklinks{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
}

.quicklink{
text-decoration:none;
color:white;
padding:25px;
text-align:center;
border-radius:20px;
background:rgba(13,20,27,.75);
border:1px solid rgba(255,255,255,.2);
backdrop-filter:blur(12px);
transition:.3s;
}

.quicklink:hover{
background:var(--orange);
transform:translateY(-5px);
}

.icon{
font-size:48px;
margin-bottom:10px;
}

.link-title{
font-size:18px;
font-weight:600;
}

/* Footer */

footer{
padding:60px 20px;
text-align:center;
}

.footer-link{
text-decoration:none;
font-size:22px;
font-weight:600;
color:var(--cream);
transition:.3s;
}

.footer-link:hover{
color:var(--orange);
}

/* iPad */

@media(max-width:1024px){

.projects{
grid-template-columns:repeat(3,1fr);
}

.quicklinks{
grid-template-columns:repeat(2,1fr);
}

}

/* iPhone */

@media(max-width:768px){

.clock{
font-size:36px;
}

.date,
.utc{
font-size:16px;
}

.section-title{
font-size:30px;
}

.projects{
grid-template-columns:1fr;
}

.project-card{
height:140px;
font-size:30px;
}

.quicklinks{
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.icon{
font-size:36px;
}

.link-title{
font-size:15px;
}

.timer-display{
font-size:48px;
}

}

</style>
</head>

<script>

function searchEcosia(){

const query=document.getElementById('search').value;

if(query){

window.open(
'https://www.ecosia.org/search?q='+
encodeURIComponent(query),
'_blank'
);

}

}

document.getElementById('search')
.addEventListener('keypress',function(e){

if(e.key==='Enter'){
searchEcosia();
}

});

function updateTime(){

const now=new Date();

document.getElementById('clock').textContent=
now.toLocaleTimeString('de-DE');

document.getElementById('utc').textContent=
'UTC: '+now.toUTCString().split(' ')[4];

document.getElementById('date').textContent=
now.toLocaleDateString('de-DE',{
weekday:'long',
day:'numeric',
month:'long',
year:'numeric'
});

}

setInterval(updateTime,1000);
updateTime();

let timerInterval;
let seconds=1500;

function drawTimer(){

const m=Math.floor(seconds/60);
const s=seconds%60;

document.getElementById('timer').textContent=
String(m).padStart(2,'0')+
':'+
String(s).padStart(2,'0');

}

function startTimer(){

clearInterval(timerInterval);

seconds=
document.getElementById('minutes').value*60;

drawTimer();

timerInterval=setInterval(()=>{

if(seconds>0){

seconds--;
drawTimer();

}

},1000);

}

function stopTimer(){

clearInterval(timerInterval);

}

function resetTimer(){

clearInterval(timerInterval);

seconds=
document.getElementById('minutes').value*60;

drawTimer();

}

drawTimer();

</script>
